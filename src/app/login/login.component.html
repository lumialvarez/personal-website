<div class="login-page">
  <div class="login-bg" aria-hidden="true">
    <div class="login-bg-orb login-bg-orb--1"></div>
    <div class="login-bg-orb login-bg-orb--2"></div>
    <div class="login-bg-orb login-bg-orb--3"></div>
  </div>

  <button id="btnVolver" class="login-back" routerLink="/">
    <i class="fas fa-arrow-left me-2" aria-hidden="true"></i>Regresar al Inicio
  </button>

  <div class="container login-container">
    <form #myForm="ngForm" (ngSubmit)="login()" class="box mx-auto fade-up" novalidate>
      <div class="login-logo" aria-hidden="true">
        <span class="login-logo-dot"></span>
      </div>
      <h1 class="login-title">Bienvenido</h1>
      <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

      <div class="login-field">
        <i class="fas fa-user login-field-icon" aria-hidden="true"></i>
        <input id="user" type="text" class="login-input"
               placeholder="Usuario"
               [(ngModel)]="userName" name="usuario" required autocomplete="username">
      </div>

      <div class="login-field">
        <i class="fas fa-lock login-field-icon" aria-hidden="true"></i>
        <input id="pass" type="password" class="login-input"
               placeholder="Contraseña"
               [(ngModel)]="passwordUser" name="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="login-submit"
              [disabled]="!myForm.valid">
        <span>Iniciar Sesión</span>
        <i class="fas fa-arrow-right ms-2" aria-hidden="true"></i>
      </button>
    </form>
  </div>
</div>
